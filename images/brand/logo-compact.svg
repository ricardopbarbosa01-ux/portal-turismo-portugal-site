<?xml version="1.0" encoding="UTF-8"?>
<!--
  Portugal Travel Hub — Compact Horizontal Logo (Dark)
  Use in: email footers, footer strips, browser tabs, tight horizontal slots.
  Icon is scaled to 32×32px; wordmark is two-line, compact spacing.
  Ideal max-height: 40px rendered. Scales cleanly to any size above that.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 40" role="img" aria-label="Portugal Travel Hub">
  <title>Portugal Travel Hub</title>

  <defs>
    <style type="text/css">
      .ptl-serif {
        font-family: Georgia, 'Palatino Linotype', Palatino, 'Book Antiqua', serif;
      }
      .ptl-sans {
        font-family: 'Gill Sans MT', 'Gill Sans', Optima, Calibri, sans-serif;
      }
    </style>
  </defs>

  <!-- ═══════════════════════════════════
       ICON — scaled to 32×32
       translate(4,4) then scale(0.6667) → 48×0.6667 = 32px
       Icon occupies (4,4)→(36,36); center at (20,20) = midpoint of 40px height
       ═══════════════════════════════════ -->
  <g transform="translate(4, 4) scale(0.6667)">

    <circle cx="24" cy="24" r="21" fill="none" stroke="#1B3A6B" stroke-width="1.5"/>

    <line x1="24" y1="3"  x2="24" y2="8"  stroke="#1B3A6B" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="24" y1="40" x2="24" y2="45" stroke="#1B3A6B" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="40" y1="24" x2="45" y2="24" stroke="#1B3A6B" stroke-width="1.5" stroke-linecap="round"/>

    <circle cx="38.9" cy="9.1"  r="0.75" fill="#1B3A6B" opacity="0.4"/>
    <circle cx="9.1"  cy="9.1"  r="0.75" fill="#1B3A6B" opacity="0.4"/>
    <circle cx="38.9" cy="38.9" r="0.75" fill="#1B3A6B" opacity="0.4"/>
    <circle cx="9.1"  cy="38.9" r="0.75" fill="#1B3A6B" opacity="0.4"/>

    <path d="M 5,24 L 24,19 L 24,29 Z" fill="#C9A84C"/>
    <path d="M 43,24 L 24,19 L 24,29 Z" fill="#1B3A6B"/>

    <circle cx="24" cy="24" r="2.5" fill="#1B3A6B"/>
    <circle cx="24" cy="24" r="1"   fill="#FFFFFF"/>

  </g>

  <!-- Vertical rule (icon end ~36px + 5px gap = x=41) -->
  <line x1="42" y1="10" x2="42" y2="30" stroke="#1B3A6B" stroke-width="0.75" opacity="0.2"/>

  <!-- ═══════════════════════════════════
       COMPACT WORDMARK (two lines, tight)
       Text block center aligned with icon center (y=20)
       PORTUGAL  baseline y=18 → cap top ≈ y=9
       TRAVEL HUB baseline y=30 → descenders ≈ y=33
       Visual center: (9+33)/2 = 21 ≈ icon center y=20 ✓
       ═══════════════════════════════════ -->

  <!-- PORTUGAL -->
  <text
    x="50" y="18"
    class="ptl-serif"
    font-size="13"
    font-weight="bold"
    letter-spacing="2"
    fill="#1B3A6B">PORTUGAL</text>

  <!-- TRAVEL HUB -->
  <text
    x="50.5" y="30"
    class="ptl-sans"
    font-size="8.5"
    font-weight="300"
    letter-spacing="4.5"
    fill="#C9A84C">TRAVEL HUB</text>

</svg>
