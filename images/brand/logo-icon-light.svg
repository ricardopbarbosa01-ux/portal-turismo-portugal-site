<?xml version="1.0" encoding="UTF-8"?>
<!--
  Portugal Travel Hub — Logo Icon (Light / Reversed)
  Use on dark backgrounds: navy header, dark hero sections, dark footers.
  Ring, ticks, and East needle are white; West needle remains gold.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="Portugal Travel Hub">
  <title>Portugal Travel Hub</title>

  <!-- Outer compass ring (white) -->
  <circle cx="24" cy="24" r="21" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>

  <!-- Cardinal ticks: N, S, E (white) -->
  <line x1="24" y1="3"  x2="24" y2="8"  stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="40" x2="24" y2="45" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="24" x2="45" y2="24" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Intercardinal marks (white, subtle) -->
  <circle cx="38.9" cy="9.1"  r="0.75" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="9.1"  cy="9.1"  r="0.75" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="38.9" cy="38.9" r="0.75" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="9.1"  cy="38.9" r="0.75" fill="#FFFFFF" opacity="0.5"/>

  <!-- Compass needle: Gold → West (Atlantic). Gold always holds. -->
  <path d="M 5,24 L 24,19 L 24,29 Z" fill="#C9A84C"/>

  <!-- Compass needle: White → East counterbalance -->
  <path d="M 43,24 L 24,19 L 24,29 Z" fill="#FFFFFF" opacity="0.85"/>

  <!-- Center pivot (white with navy inner) -->
  <circle cx="24" cy="24" r="2.5" fill="#FFFFFF"/>
  <circle cx="24" cy="24" r="1"   fill="#1B3A6B"/>
</svg>
