<?xml version="1.0" encoding="UTF-8"?>
<!--
  Portugal Travel Hub — Full Logo (Dark / Standard)
  Layout: Icon (48×48) + vertical rule + wordmark
  Typography pairing (editorial):
    PORTUGAL  → Georgia serif, bold, tracked — authoritative, classic
    TRAVEL HUB → humanist sans, light, open tracking — modern counterpoint
  For dark backgrounds, use logo-full-light.svg instead.

  NOTE: For print/offline use, convert <text> elements to paths
  using Inkscape (Path → Object to Path) or Illustrator (Type → Create Outlines).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 264 64" role="img" aria-label="Portugal Travel Hub">
  <title>Portugal Travel Hub</title>

  <defs>
    <style type="text/css">
      .ptl-serif {
        font-family: Georgia, 'Palatino Linotype', Palatino, 'Book Antiqua', serif;
      }
      .ptl-sans {
        font-family: 'Gill Sans MT', 'Gill Sans', Optima, Calibri, sans-serif;
      }
    </style>
  </defs>

  <!-- ═══════════════════════════════════
       ICON — compass mark (48×48)
       Positioned 8px from top-left corner
       ═══════════════════════════════════ -->
  <g transform="translate(8, 8)">

    <!-- Outer compass ring -->
    <circle cx="24" cy="24" r="21" fill="none" stroke="#1B3A6B" stroke-width="1.5"/>

    <!-- Cardinal ticks: N, S, E -->
    <line x1="24" y1="3"  x2="24" y2="8"  stroke="#1B3A6B" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="24" y1="40" x2="24" y2="45" stroke="#1B3A6B" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="40" y1="24" x2="45" y2="24" stroke="#1B3A6B" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Intercardinal marks -->
    <circle cx="38.9" cy="9.1"  r="0.75" fill="#1B3A6B" opacity="0.4"/>
    <circle cx="9.1"  cy="9.1"  r="0.75" fill="#1B3A6B" opacity="0.4"/>
    <circle cx="38.9" cy="38.9" r="0.75" fill="#1B3A6B" opacity="0.4"/>
    <circle cx="9.1"  cy="38.9" r="0.75" fill="#1B3A6B" opacity="0.4"/>

    <!-- Compass needle: Gold → West (Atlantic) -->
    <path d="M 5,24 L 24,19 L 24,29 Z" fill="#C9A84C"/>

    <!-- Compass needle: Navy → East -->
    <path d="M 43,24 L 24,19 L 24,29 Z" fill="#1B3A6B"/>

    <!-- Center pivot -->
    <circle cx="24" cy="24" r="2.5" fill="#1B3A6B"/>
    <circle cx="24" cy="24" r="1"   fill="#FFFFFF"/>

  </g>

  <!-- Vertical rule separating icon from wordmark -->
  <line x1="66" y1="17" x2="66" y2="47" stroke="#1B3A6B" stroke-width="0.75" opacity="0.2"/>

  <!-- ═══════════════════════════════════
       WORDMARK
       Baseline grid: PORTUGAL y=30, TRAVEL HUB y=45
       Text block vertically centered with the icon
       ═══════════════════════════════════ -->

  <!-- PORTUGAL — editorial serif, bold, spaced -->
  <text
    x="78" y="30"
    class="ptl-serif"
    font-size="20"
    font-weight="bold"
    letter-spacing="3"
    fill="#1B3A6B">PORTUGAL</text>

  <!-- TRAVEL HUB — humanist sans, light, open tracking, gold -->
  <text
    x="79.5" y="45"
    class="ptl-sans"
    font-size="10"
    font-weight="300"
    letter-spacing="5.5"
    fill="#C9A84C">TRAVEL HUB</text>

</svg>
