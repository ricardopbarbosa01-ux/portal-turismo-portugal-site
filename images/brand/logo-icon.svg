<?xml version="1.0" encoding="UTF-8"?>
<!--
  Portugal Travel Hub — Logo Icon (Dark)
  Concept: "O Agulha do Ocidente" — The Western Needle
  The compass needle points West toward the Atlantic Ocean,
  Portugal's defining geographic and historic direction.
  Gold = West (Atlantic); Navy = East (land, stability, trust).
  Readable from 16×16px (favicon) to any size.
  For dark backgrounds, use logo-icon-light.svg instead.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="Portugal Travel Hub">
  <title>Portugal Travel Hub</title>

  <!-- Outer compass ring -->
  <circle cx="24" cy="24" r="21" fill="none" stroke="#1B3A6B" stroke-width="1.5"/>

  <!-- Cardinal ticks: North, South, East
       West is intentionally omitted — the gold needle tip IS the West marker -->
  <line x1="24" y1="3"  x2="24" y2="8"  stroke="#1B3A6B" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="40" x2="24" y2="45" stroke="#1B3A6B" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="24" x2="45" y2="24" stroke="#1B3A6B" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Intercardinal position marks (nautical chart detail, subtle) -->
  <circle cx="38.9" cy="9.1"  r="0.75" fill="#1B3A6B" opacity="0.4"/>
  <circle cx="9.1"  cy="9.1"  r="0.75" fill="#1B3A6B" opacity="0.4"/>
  <circle cx="38.9" cy="38.9" r="0.75" fill="#1B3A6B" opacity="0.4"/>
  <circle cx="9.1"  cy="38.9" r="0.75" fill="#1B3A6B" opacity="0.4"/>

  <!-- Compass needle: Gold half → points West (toward the Atlantic) -->
  <path d="M 5,24 L 24,19 L 24,29 Z" fill="#C9A84C"/>

  <!-- Compass needle: Navy half → counterbalance, East -->
  <path d="M 43,24 L 24,19 L 24,29 Z" fill="#1B3A6B"/>

  <!-- Center pivot -->
  <circle cx="24" cy="24" r="2.5" fill="#1B3A6B"/>
  <circle cx="24" cy="24" r="1"   fill="#FFFFFF"/>
</svg>
