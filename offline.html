<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sem ligação · Portugal Travel Hub</title>
  <meta name="robots" content="noindex, nofollow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --blue: #0a3d6b; --gold: #c9a84c; --gold-light: #e8c97a;
      --white: #ffffff; --off-white: #f6f4ef; --text-mid: #4a5568;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, var(--blue) 0%, #0d2b4e 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100dvh; padding: 32px 5vw; text-align: center; color: var(--white);
    }
    :focus-visible { outline: 2px solid var(--gold); outline-offset: 3px; border-radius: 4px; }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; } }

    .logo {
      display: flex; align-items: center; gap: 10px; margin-bottom: 48px;
      font-family: 'Bodoni Moda', serif; font-size: 1.2rem; color: var(--white);
      text-decoration: none;
    }
    .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      border-radius: 12px; display: flex; align-items: center; justify-content: center;
    }
    .logo-icon svg { width: 22px; height: 22px; fill: var(--blue); }

    .icon-wrap {
      width: 80px; height: 80px; border-radius: 24px;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 32px;
      animation: pulse 3s ease-in-out infinite;
    }
    .icon-wrap svg { width: 40px; height: 40px; stroke: var(--gold); fill: none; stroke-width: 1.5; stroke-linecap: round; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

    .tag {
      display: inline-block; font-size: 0.75rem; font-weight: 600;
      letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold);
      margin-bottom: 16px;
    }
    h1 {
      font-family: 'Bodoni Moda', serif; font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 700; line-height: 1.1; margin-bottom: 16px;
    }
    h1 em { font-style: italic; color: var(--gold-light); }
    p {
      font-size: 1rem; color: rgba(255,255,255,0.72); line-height: 1.7;
      max-width: 440px; margin: 0 auto 40px;
    }

    .actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 13px 28px; border-radius: 50px; font-family: 'Inter', sans-serif;
      font-size: 0.9rem; font-weight: 600; cursor: pointer; min-height: 48px;
      text-decoration: none; transition: transform 0.25s, opacity 0.25s;
    }
    .btn:hover { transform: translateY(-2px); opacity: 0.92; }
    .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: var(--blue); }
    .btn-outline { border: 1.5px solid rgba(255,255,255,0.25); color: var(--white); background: rgba(255,255,255,0.07); }
    .btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }

    .tip {
      margin-top: 48px; font-size: 0.8rem; color: rgba(255,255,255,0.35);
    }
  </style>
</head>
<body>

<a href="/" class="logo" aria-label="Portugal Travel Hub — Início">
  <div class="logo-icon" aria-hidden="true">
    <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
  </div>
  Portugal Travel Hub
</a>

<div class="icon-wrap" aria-hidden="true">
  <svg viewBox="0 0 24 24">
    <path d="M1 6s.875 13 11 13S23 6 23 6"/>
    <path d="M12 19v-7"/>
    <path d="M8 14l4 4 4-4"/>
    <line x1="1" y1="1" x2="23" y2="23"/>
  </svg>
</div>

<div class="tag">Sem ligação à internet</div>
<h1>Parece que está <em>offline</em></h1>
<p>Não foi possível carregar esta página. Verifique a sua ligação à internet e tente novamente — Portugal vai estar à espera.</p>

<div class="actions">
  <button class="btn btn-gold" onclick="window.location.reload()">
    <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/></svg>
    Tentar novamente
  </button>
  <a href="/" class="btn btn-outline">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Início
  </a>
</div>

<p class="tip">Se utiliza a plataforma regularmente, as páginas principais podem estar disponíveis em cache.</p>

</body>
</html>
