  <style>
    .account-root {
      display: grid;
      grid-template-columns: 240px 1fr;

    .account-sidebar {
      background: var(--blue);
      display: flex;

      height: calc(100vh - 64px);

    }
    .acc-avatar {
      width: 56px; height: 56px; border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), #1a5fa3);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.25rem; font-weight: 700; color: var(--white);
      margin-bottom: 14px; flex-shrink: 0;
    }
    .acc-name {
      font-size: 0.95rem; font-weight: 600; color: var(--white);
      margin-bottom: 4px; word-break: break-word;
    }
    .acc-email {
      font-size: 0.75rem; color: rgba(255,255,255,0.45);
      margin-bottom: 14px; word-break: break-word;
    }
    .acc-pro-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.08em;
      background: rgba(201,168,76,0.18); color: var(--gold);
      border: 1px solid rgba(201,168,76,0.30);
      padding: 3px 9px; border-radius: 20px; margin-bottom: 28px;
      width: fit-content;
    }
    .acc-sidebar-nav {
      flex: 1;
      display: flex; flex-direction: column; gap: 2px;
    }
    .acc-nav-link {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 8px;
      font-size: 0.875rem; font-weight: 500;
      color: rgba(255,255,255,0.65); text-decoration: none;
      transition: background 0.15s, color 0.15s;
    }
    .acc-nav-link:hover { background: rgba(255,255,255,0.07); color: var(--white); }
    .acc-nav-link.active { background: rgba(255,255,255,0.12); color: var(--white); font-weight: 600; }
    .acc-signout {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.8125rem; color: rgba(255,255,255,0.45);
      cursor: pointer; padding: 10px 0; background: none; border: none;
      font-family: var(--font-body); transition: color 0.15s;
      text-align: left; margin-top: 24px; border-top: 1px solid rgba(255,255,255,0.08);
      padding-top: 16px; width: 100%;
    }
    .acc-signout svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; flex-shrink: 0; }
    .acc-signout:hover { color: rgba(255,255,255,0.8); }

    .account-main {
      background: var(--off-white);
      min-height: calc(100vh - 64px);
      padding: 40px 40px;
    }
    .account-topbar {
      margin-bottom: 28px;
    }
    .account-topbar h1 {
      font-family: var(--font-heading); font-size: 1.5rem;
      font-weight: 700; color: var(--blue); margin: 0 0 4px;
    }
    .account-topbar p {
      font-size: 0.875rem; color: var(--text-light); margin: 0;
    }

    @media (max-width: 860px) {
      .account-root { grid-template-columns: 1fr; margin-top: 60px; }
      .account-sidebar {
        position: static; height: auto; flex-direction: row;
        flex-wrap: wrap; align-items: center; gap: 12px;
        padding: 16px 20px;
      }
      .acc-avatar { width: 40px; height: 40px; font-size: 1rem; margin-bottom: 0; }
      .acc-pro-badge { margin-bottom: 0; }
      .acc-email { display: none; }
      .acc-sidebar-nav { flex-direction: row; flex: none; }
      .acc-signout { margin-top: 0; border-top: none; padding-top: 0; }
      .account-main { padding: 24px 16px; }
    }

<script>
/* ── Auth guard + init ─────────────────────────────────────────── */
(async () => {
  const { data: { user } } = await db.auth.getUser();
  if (!user) { window.location.href = '/login.html'; return; }

  const justPaid = new URLSearchParams(window.location.search).get('activated') === '1';
  if (user.app_metadata?.plan !== 'pro' && !justPaid) { window.location.href = '/precos.html'; return; }

  // Preencher dados do utilizador na sidebar
  const name = user.user_metadata?.full_name || user.email || '';
  const initial = (user.user_metadata?.full_name || user.email || '?').charAt(0).toUpperCase();
  document.getElementById('acc-avatar').textContent = initial;
  document.getElementById('acc-name').textContent = name;
  document.getElementById('acc-email').textContent = user.email || '';

  // Logout
  document.getElementById('signout-btn').addEventListener('click', async () => {
    await db.auth.signOut();
    window.location.href = '/';
  });

  // Carregar favoritos (se já Pro confirmado)
  if (user.app_metadata?.plan === 'pro' && !justPaid) {
    await loadFavoritesSection();
  }

  // Post-checkout activation confirmation with polling (race condition hardening)
  if (justPaid) {
    history.replaceState(null, '', '/conta.html');

    function isProActive(u) { return u?.app_metadata?.plan === 'pro'; }

    const pendingEl = document.createElement('div');
    pendingEl.id = 'pro-pending';
    pendingEl.setAttribute('aria-live', 'polite');
    pendingEl.style.cssText = 'text-align:center;padding:12px 24px;color:var(--gold,#C9A84C);font-size:0.875rem;font-weight:500;';
    pendingEl.textContent = 'A verificar ativação…';
    document.querySelector('.account-main')?.prepend(pendingEl);

    const { data: { user: freshUser } } = await db.auth.getUser();
    if (isProActive(freshUser)) {
      // Webhook disparou antes do redirect — confirmação imediata
      pendingEl.remove();
      await loadFavoritesSection();
      track('pro_activation_return', { page: 'conta', result: 'immediate' });
      showToast('Plano Pro ativado com sucesso! Bem-vindo ao Pro.', 'success');
    } else {
      // Poll até role confirmado ou timeout 12s (6 × 2s)
      let attempts = 0;
      const MAX_ATTEMPTS = 6;
      const pollTimer = setInterval(async () => {
        attempts++;
        const { data: { user: polled } } = await db.auth.getUser();
        if (isProActive(polled)) {
          clearInterval(pollTimer);
          pendingEl.remove();
          await loadFavoritesSection();
          track('pro_activation_return', { page: 'conta', result: 'polled', attempts });
          showToast('Plano Pro ativado com sucesso! Bem-vindo ao Pro.', 'success');
        } else if (attempts >= MAX_ATTEMPTS) {
          clearInterval(pollTimer);
          pendingEl.textContent = 'A ativação pode demorar alguns segundos. Atualiza esta página.';
          pendingEl.style.color = 'var(--text-light)';
        }
      }, 2000);
    }
  }
})();

/* ── Favorites (copiado de dashboard.html sem alterações) ──────── */
async function loadFavoritesSection() {
  const grid = document.getElementById('favorites-grid');
  if (!grid) return;

  grid.innerHTML = '<div class="favorites-loading"><div class="spinner-small"></div> A carregar favoritos...</div>';

  const favs = await getFavorites();

  if (!favs.length) {
    grid.innerHTML = `
      <div class="favorites-empty">
        <div class="favorites-empty-icon">🏖️</div>
        <p>Ainda não tens favoritos guardados.</p>
        <a href="/beaches.html" class="btn-explore-beaches">Explorar Praias</a>
      </div>`;
    return;
  }

  // Buscar dados das praias do Supabase para mostrar imagem e região
  const ids = favs.map(f => f.beach_id);
  const { data: beaches } = await db
    .from('beaches')
    .select('id, name, region, image_url, water_quality, latitude, longitude')
    .in('id', ids);

  const beachMap = {};
  (beaches || []).forEach(b => { beachMap[b.id] = b; });

  grid.innerHTML = favs.map(f => {
    const b = beachMap[f.beach_id] || {};
    const img = b.image_url || '/images/beach-placeholder.jpg';
    const region = b.region || f.beach_region || 'Portugal';
    const quality = b.water_quality || '';
    const qualityBadge = quality
      ? `<span class="fav-badge fav-badge--${quality.toLowerCase()}">${quality}</span>`
      : '';

    return `
      <div class="fav-card">
        <a href="/beach.html?id=${f.beach_id}" class="fav-card-img-link">
          <div class="fav-card-img" style="background-image:url('${img}')">
            <div class="fav-card-overlay"></div>
            <div class="fav-card-badges">${qualityBadge}</div>
          </div>
        </a>
        <div class="fav-card-body">
          <div class="fav-card-info">
            <a href="/beach.html?id=${f.beach_id}" class="fav-card-name">${f.beach_name}</a>
            <span class="fav-card-region">📍 ${region}</span>
          </div>
          <div class="fav-card-actions">
            <a href="/beach.html?id=${f.beach_id}" class="btn-fav-view">Ver praia</a>
            <button class="btn-fav-remove" title="Remover favorito"
              onclick="removeFavorite('${f.beach_id}', '${f.beach_name}', '${region}')">
              ✕
            </button>
          </div>
        </div>
      </div>`;
  }).join('');
}

async function removeFavorite(beachId, beachName, beachRegion) {
  await toggleFavorite(beachId, beachName, beachRegion);
  loadFavoritesSection();
}
</script>
